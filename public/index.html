<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CMSK Store — ช้อปสินค้าคุณภาพ</title>
  <meta name="description" content="ร้านค้าออนไลน์ดีไซน์มินิมอล คัดสรรสินค้าคุณภาพส่งตรงถึงบ้านคุณ" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="container header-inner">
      <a href="#" class="brand" id="brandHome" aria-label="CMSK Store หน้าแรก">
        <span class="logo-mark" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        </span>
        CMSK Store
      </a>
      <nav class="nav" aria-label="หลัก">
        <a href="#products" class="nav-link">สินค้า</a>
        <a href="/admin.html" class="nav-link">ระบบหลังบ้าน</a>
        <button class="icon-btn" id="cartBtn" aria-label="ตะกร้าสินค้า">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
          <span class="cart-count hide" id="cartCount">0</span>
        </button>
      </nav>
    </div>
  </header>

  <main class="container">
    <!-- ===== HOME VIEW ===== -->
    <div id="homeView">
      <!-- Hero slider -->
      <section class="hero" aria-roledescription="carousel" aria-label="โปรโมชันเด่น">
        <div class="hero-viewport">
          <div class="hero-track" id="heroTrack"><!-- slides injected --></div>
          <button class="hero-nav hero-prev" id="heroPrev" aria-label="สไลด์ก่อนหน้า">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <button class="hero-nav hero-next" id="heroNext" aria-label="สไลด์ถัดไป">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </button>
          <div class="hero-dots" id="heroDots" role="tablist" aria-label="เลือกสไลด์"></div>
        </div>
      </section>

      <!-- Products -->
      <section class="section" id="products">
        <div class="section-head">
          <div>
            <h2 class="section-title">สินค้าทั้งหมด</h2>
            <p class="section-sub">คัดสรรมาเพื่อคุณ — เลือกหมวดหมู่ที่สนใจ</p>
          </div>
          <div class="chips" id="categoryChips"></div>
        </div>
        <div class="grid" id="productGrid"></div>
      </section>
    </div>

    <!-- ===== DETAIL VIEW ===== -->
    <div id="detailView" class="section hide"></div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span>© 2026 CMSK Store — สร้างด้วยใจ ✦ ดีไซน์ตามหลัก UI/UX Pro Max</span>
      <a href="/admin.html" class="nav-link" style="padding-inline:0">ไปยังระบบหลังบ้าน →</a>
    </div>
  </footer>

  <div class="toast-wrap" id="toastWrap" aria-live="polite"></div>

  <script src="/js/store.js"></script>
</body>
</html>
